version: 0.2

# Build phase: Docker build and ECR push to euw1.
# ECR replication (configured at the registry level) handles propagation to use1.
# The deploy stage for each region runs cdk-deploy independently after replication.

env:
  shell: bash
  variables:
    UV_HOME: "$HOME/.local/bin"

phases:
  install:
    commands:
      - echo "Installing uv..."
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - source $HOME/.local/bin/env
      - uv --version

  pre_build:
    commands:
      - echo "Starting build phase for $SKILL_PATH in $ENVIRONMENT environment"
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"

  build:
    commands:
      - echo "Building and pushing Docker image using deploy.sh..."
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"

      # Fetch JFrog credentials and build in SAME command block (env vars must be in same shell)
      - |
        echo "Fetching JFrog credentials from SSM Parameter Store..."
        JFROG_USERNAME=$(aws ssm get-parameter --name "/a207920/leon-skills/jfrog/username" --with-decryption --query "Parameter.Value" --output text --region $AWS_DEFAULT_REGION)
        JFROG_TOKEN=$(aws ssm get-parameter --name "/a207920/leon-skills/jfrog/token" --with-decryption --query "Parameter.Value" --output text --region $AWS_DEFAULT_REGION)
        export JFROG_USERNAME
        export JFROG_TOKEN
        echo "JFrog credentials loaded: username=${JFROG_USERNAME:0:3}***"

        cd $CODEBUILD_SRC_DIR/$SKILL_PATH/infra
        chmod +x deploy.sh

        # Compute version once and reuse for both build and push
        echo "Computing image version..."
        IMAGE_TAG=$(./deploy.sh version)
        echo "Using image tag: $IMAGE_TAG"
        export IMAGE_TAG

        # Build with the computed tag
        echo "Building Docker image..."
        ./deploy.sh build $ENVIRONMENT $IMAGE_TAG

        # Push to euw1 ECR — ECR replication propagates to use1 automatically
        echo "Pushing Docker image to ECR..."
        ./deploy.sh push $ENVIRONMENT $IMAGE_TAG

      # Get the most recently pushed image tag from ECR (dynamically from skill config)
      - |
        cd $CODEBUILD_SRC_DIR/$SKILL_PATH/infra
        export DEPLOYMENT_ENV=$ENVIRONMENT
        ECR_REPO=$(python3 -c "from config import CONFIG; print(CONFIG.ecr_repository_name)")
        echo "Using ECR repository: $ECR_REPO"
        IMAGE_TAG=$(aws ecr describe-images \
          --repository-name "$ECR_REPO" \
          --region $AWS_DEFAULT_REGION \
          --query 'sort_by(imageDetails,& imagePushedAt)[-1].imageTags[0]' \
          --output text)
        echo "Image tag captured - $IMAGE_TAG"

  post_build:
    commands:
      - echo "Build completed successfully"
      - echo "IMAGE_TAG=$IMAGE_TAG"
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"
      # Export image tag for deploy stage
      - cd $CODEBUILD_SRC_DIR
      - echo $IMAGE_TAG > imagetag.txt

artifacts:
  files:
    - imagetag.txt
    - '**/*'
  name: BuildOutput
