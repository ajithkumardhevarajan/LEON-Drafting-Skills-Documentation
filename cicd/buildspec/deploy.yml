version: 0.2

# Deploy phase: CDK deployment to ECS
# Leverages existing deploy.sh cdk-deploy command which handles everything

env:
  shell: bash
  variables:
    UV_HOME: "$HOME/.local/bin"

phases:
  install:
    runtime-versions:
      python: 3.11
      nodejs: 20
    commands:
      # Install uv for fast Python package management
      - echo "Installing uv..."
      - curl -LsSf https://astral.sh/uv/install.sh | sh
      - source $HOME/.local/bin/env
      - uv --version

      # Install AWS CDK CLI via npm
      - echo "Installing AWS CDK CLI..."
      - npm install -g aws-cdk@2.233.0
      - cdk --version

      # Configure pip to use TR JFrog Artifactory for internal packages (tr-cdk-lib)
      - echo "Configuring pip for TR JFrog..."
      - mkdir -p ~/.pip
      - |
        JFROG_USERNAME=$(aws ssm get-parameter --name "/a207920/leon-skills/jfrog/username" --with-decryption --query "Parameter.Value" --output text --region $AWS_DEFAULT_REGION)
        JFROG_TOKEN=$(aws ssm get-parameter --name "/a207920/leon-skills/jfrog/token" --with-decryption --query "Parameter.Value" --output text --region $AWS_DEFAULT_REGION)
        cat > ~/.pip/pip.conf << EOF
        [global]
        extra-index-url = https://${JFROG_USERNAME}:${JFROG_TOKEN}@tr1.jfrog.io/tr1/api/pypi/pypi-local/simple
        trusted-host = tr1.jfrog.io
        EOF
      - echo "Pip configured for TR JFrog"

  pre_build:
    commands:
      - echo "Starting deploy phase for $SKILL_PATH in $ENVIRONMENT environment"
      - |
        if [ -f "$CODEBUILD_SRC_DIR_BuildOutput/imagetag.txt" ]; then
          IMAGE_TAG=$(cat "$CODEBUILD_SRC_DIR_BuildOutput/imagetag.txt")
          echo "IMAGE_TAG read from BuildOutput artifact - $IMAGE_TAG"
          export IMAGE_TAG
        else
          echo "ERROR - imagetag.txt not found!"
          find $CODEBUILD_SRC_DIR* -name "imagetag.txt" 2>/dev/null || echo "Not found"
          exit 1
        fi
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"

  build:
    commands:
      - echo "Deploying with CDK using deploy.sh..."
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"
      - cd $SKILL_PATH/infra
      - chmod +x deploy.sh

      # Export environment variables for CDK
      # Re-read IMAGE_TAG from artifact to ensure it's available in this phase
      - |
        if [ -f "$CODEBUILD_SRC_DIR_BuildOutput/imagetag.txt" ]; then
          export IMAGE_TAG=$(cat "$CODEBUILD_SRC_DIR_BuildOutput/imagetag.txt")
          echo "IMAGE_TAG exported for deployment - $IMAGE_TAG"
        else
          echo "ERROR - imagetag.txt not found in build phase!"
          exit 1
        fi
      - export DEPLOYMENT_ENV=$ENVIRONMENT

      # deploy.sh cdk-deploy handles:
      # - Creating Python venv
      # - Installing dependencies with uv (if available) or pip
      # - Running cdk deploy
      # IMAGE_TAG is read from environment variable
      - echo "Running deploy.sh cdk-deploy..."
      - ./deploy.sh cdk-deploy $ENVIRONMENT

  post_build:
    commands:
      - echo "Deployment completed successfully"
      - echo "Skill $SKILL_PATH deployed to $ENVIRONMENT environment"
      - source $HOME/.local/bin/env || export PATH="$HOME/.local/bin:$PATH"

      # Show deployment status
      - ./deploy.sh status $ENVIRONMENT

artifacts:
  files:
    - '**/*'
  name: DeployOutput
